interface:
  display_name: "Work With Outline"
  short_description: "Read and safely update Outline docs via the Garena gateway"
  default_prompt: "Use $work-with-outline to read this Outline link through the gateway-exposed Outline tools and build context from the target page and its descendants only."
dependencies:
  tools:
    - type: "mcp"
      value: "garena_vn_mcp_gw"
      description: "Garena gateway exposing Outline tools for wiki.odp.garena.vn"
      transport: "streamable_http"
      url: "https://mcp.odp.garena.vn/mcp"
policy:
  allow_implicit_invocation: true
